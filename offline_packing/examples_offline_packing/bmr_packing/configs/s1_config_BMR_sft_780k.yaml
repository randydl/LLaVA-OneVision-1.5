# Data path configuration.
data:
  # Sample data directory.
  directory: "/data_1/llava_next_raw_full/split_json_files/"
  # directory: "/vlm/data/llava_next_500/split_json_files"
  # Temporary file for storing paired base names.
  output_base: "base_name_v4_MR_sft_780k_8k.txt"
  # Final output file containing token-length information.
  output_token: "token_info_MR_sft_780k_8k.txt"

# Model path.
model:
  checkpoint: "/vlm/xiangan/pretrain_models/rice_vl/rice_vl_rice_300m_qwen2.5_7b_adapter_v1_fixed_tokenizer_huggingface"

sample:
  # Maximum training sequence length.
  max_len: 8192
  del_one_token: false
  # Select parsing mode.
  task_type: sft 
  max_prompt: null
  max_answer: null

# Image-processing settings.
image:
  baidu_resolution: 1800 # Legacy Baidu-side resolution limit; set null to disable.
  min_pixels: 3136   # 4*28*28
  max_pixels: 4014080 # 5120*28*28(4014080,8192)
  # Maximum aspect-ratio limit. Images above this value are filtered by Qwen-VL internals.
  max_aspect_ratio: 200

# Parallel-processing settings.
processing:
  # Number of samples handled by each process chunk.
  chunk_size: 5000
  # Merge setting: merge every N stage0 files into one stage1 file after sorting.
  stage1_merge_chunk: 20
  n_workers: 64
  # Minimum thread-pool size.
  min_workers: 10
  # Maximum thread-pool size.
  max_workers: 32
  # Timeout setting. Tune by data size; 1M samples were historically estimated at about 45 minutes (2700s).
  time_out: 20000

# Logging and temporary-file settings.
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, or CRITICAL.
  level: "INFO"
  # Log file path.
  file: "./logs/s1_processing_MR_sft_780k_8k.log"
  # Whether to use /dev/shm as the temporary directory.
  use_shm: false
