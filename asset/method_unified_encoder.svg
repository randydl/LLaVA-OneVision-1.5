<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif">
  <defs>
    <style>
      .title { font-size: 28px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 14px; font-weight: 500; fill: #64748b; letter-spacing: 0.04em; text-transform: uppercase; }
      .card-label { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; }
      .card-sub { font-size: 12px; font-weight: 500; fill: #64748b; }
      .panel-sub { font-size: 13px; font-weight: 400; fill: #64748b; }
      .vit-title { font-size: 20px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .vit-sub { font-size: 12px; font-weight: 500; fill: #64748b; text-anchor: middle; letter-spacing: 0.06em; text-transform: uppercase; }
      .vit-tag { font-size: 11px; font-weight: 700; fill: #2563eb; text-anchor: middle; letter-spacing: 0.12em; text-transform: uppercase; }
      .out-label { font-size: 13px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .out-sub { font-size: 11px; font-weight: 500; fill: #64748b; text-anchor: middle; letter-spacing: 0.05em; text-transform: uppercase; }
      .legend-text { font-size: 12px; font-weight: 500; fill: #334155; }
      .divider { stroke: #e2e8f0; stroke-width: 1; }
      .flow-arrow { fill: none; stroke: #94a3b8; stroke-width: 1.8; stroke-linecap: round; }
      .out-arrow { fill: none; stroke: #475569; stroke-width: 2.5; stroke-linecap: round; }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowhead-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1080" height="600" fill="#ffffff"/>

  <text x="60" y="60" class="subtitle">Figure 2 · One Encoder, Every Modality</text>
  <text x="60" y="98" class="title">Same encoder. Image, video, multi-image — one token stream.</text>
  <text x="60" y="128" class="panel-sub">No task-specific adapters. Every modality is patchified, fed into the <tspan font-weight="700" fill="#2563eb">same OneVision-Encoder</tspan>, and emitted as one token sequence.</text>

  <line x1="60" y1="160" x2="1020" y2="160" class="divider"/>

  <!-- Three input cards -->
  <g transform="translate(60, 195)">
    <rect width="240" height="92" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="92" rx="2" fill="#2563eb"/>
    <text x="16" y="20" class="card-label" fill="#2563eb">IMAGE</text>
    <text x="16" y="82" class="card-sub">1 image · 9 patches</text>
    <g transform="translate(90, 18)"><rect x="4" y="4" width="14" height="14" rx="1" fill="#2563eb" opacity="0.85"/><rect x="20" y="4" width="14" height="14" rx="1" fill="#2563eb" opacity="0.85"/><rect x="36" y="4" width="14" height="14" rx="1" fill="#2563eb" opacity="0.85"/><rect x="4" y="20" width="14" height="14" rx="1" fill="#2563eb" opacity="0.85"/><rect x="20" y="20" width="14" height="14" rx="1" fill="#2563eb" opacity="0.85"/><rect x="36" y="20" width="14" height="14" rx="1" fill="#2563eb" opacity="0.85"/><rect x="4" y="36" width="14" height="14" rx="1" fill="#2563eb" opacity="0.85"/><rect x="20" y="36" width="14" height="14" rx="1" fill="#2563eb" opacity="0.85"/><rect x="36" y="36" width="14" height="14" rx="1" fill="#2563eb" opacity="0.85"/></g>
  </g>
  <g transform="translate(60, 305)">
    <rect width="240" height="92" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="92" rx="2" fill="#f59e0b"/>
    <text x="16" y="20" class="card-label" fill="#f59e0b">VIDEO</text>
    <text x="16" y="82" class="card-sub">6 frames · 54 tokens</text>
    <g transform="translate(90, 18)"><g transform="translate(0,0)"><rect width="18" height="50" fill="none" stroke="#f59e0b" stroke-width="2" rx="2"/><rect x="2" y="2" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="7" y="2" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="12" y="2" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="2" y="18" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="7" y="18" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="12" y="18" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="2" y="34" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="7" y="34" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="12" y="34" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/></g><g transform="translate(22,0)"><rect width="18" height="50" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2" rx="2"/><rect x="2" y="16" width="4" height="4" fill="#f59e0b" opacity="0.9"/><rect x="12" y="28" width="4" height="4" fill="#f59e0b" opacity="0.9"/></g><g transform="translate(44,0)"><rect width="18" height="50" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2" rx="2"/><rect x="2" y="16" width="4" height="4" fill="#f59e0b" opacity="0.9"/><rect x="12" y="28" width="4" height="4" fill="#f59e0b" opacity="0.9"/></g><g transform="translate(66,0)"><rect width="18" height="50" fill="none" stroke="#f59e0b" stroke-width="2" rx="2"/><rect x="2" y="2" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="7" y="2" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="12" y="2" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="2" y="18" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="7" y="18" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="12" y="18" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="2" y="34" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="7" y="34" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/><rect x="12" y="34" width="4" height="14" rx="0.5" fill="#f59e0b" opacity="0.9"/></g><g transform="translate(88,0)"><rect width="18" height="50" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2" rx="2"/><rect x="2" y="16" width="4" height="4" fill="#f59e0b" opacity="0.9"/><rect x="12" y="28" width="4" height="4" fill="#f59e0b" opacity="0.9"/></g><g transform="translate(110,0)"><rect width="18" height="50" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2" rx="2"/><rect x="2" y="16" width="4" height="4" fill="#f59e0b" opacity="0.9"/><rect x="12" y="28" width="4" height="4" fill="#f59e0b" opacity="0.9"/></g></g>
  </g>
  <g transform="translate(60, 415)">
    <rect width="240" height="92" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="92" rx="2" fill="#8b5cf6"/>
    <text x="16" y="20" class="card-label" fill="#8b5cf6">MULTI-IMAGE</text>
    <text x="16" y="82" class="card-sub">3 images · 27 patches</text>
    <g transform="translate(60, 18)"><g transform="translate(0,0)"><rect width="50" height="50" fill="none" stroke="#8b5cf6" stroke-width="1.5" rx="2"/><rect x="3" y="3" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="18" y="3" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="33" y="3" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="3" y="18" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="18" y="18" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="33" y="18" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="3" y="33" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="18" y="33" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="33" y="33" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/></g><g transform="translate(60,0)"><rect width="50" height="50" fill="none" stroke="#8b5cf6" stroke-width="1.5" rx="2"/><rect x="3" y="3" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="18" y="3" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="33" y="3" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="3" y="18" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="18" y="18" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="33" y="18" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="3" y="33" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="18" y="33" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="33" y="33" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/></g><g transform="translate(120,0)"><rect width="50" height="50" fill="none" stroke="#8b5cf6" stroke-width="1.5" rx="2"/><rect x="3" y="3" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="18" y="3" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="33" y="3" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="3" y="18" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="18" y="18" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="33" y="18" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="3" y="33" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="18" y="33" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/><rect x="33" y="33" width="13" height="13" rx="1" fill="#8b5cf6" opacity="0.8"/></g></g>
  </g>

  <!-- Fan-in arrows from cards to ViT -->
  <path d="M 300 241.0 C 380 241.0, 480 355.0, 554 355.0" class="flow-arrow" marker-end="url(#arrowhead)"/>
  <path d="M 300 351.0 C 380 351.0, 480 355.0, 554 355.0" class="flow-arrow" marker-end="url(#arrowhead)"/>
  <path d="M 300 461.0 C 380 461.0, 480 355.0, 554 355.0" class="flow-arrow" marker-end="url(#arrowhead)"/>

  <!-- Central ViT block -->
  <g>
    <rect x="560" y="245" width="240" height="220" rx="10" fill="#f8fafc" stroke="#2563eb" stroke-width="2"/>
    <text x="680.0" y="287" class="vit-tag">SHARED BACKBONE</text>
    <text x="680.0" y="337" class="vit-title">OneVision-</text>
    <text x="680.0" y="363" class="vit-title">Encoder</text>
    <line x1="600" y1="389" x2="760" y2="389" stroke="#cbd5e1" stroke-width="1"/>
    <text x="680.0" y="415" class="vit-sub">ViT · codec-aligned</text>
    <text x="680.0" y="437" class="vit-sub">modality-agnostic</text>
  </g>

  <!-- Arrow ViT -> output -->
  <path d="M 800 355.0 L 874 355.0" class="out-arrow" marker-end="url(#arrowhead-dark)"/>

  <!-- Output card -->
  <g>
    <rect x="880" y="295" width="160" height="120" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="960.0" y="327" class="out-sub" fill="#2563eb">UNIFIED</text>
    <text x="960.0" y="351" class="out-label">token stream</text>
    <line x1="904" y1="367" x2="1016" y2="367" stroke="#bfdbfe" stroke-width="1"/>
    <text x="960.0" y="391" class="out-sub">→ LLM</text>
  </g>

  <!-- Footer legend -->
  <g transform="translate(60, 555)">
    <rect x="0" y="-11" width="14" height="14" fill="#2563eb" opacity="0.85"/>
    <text x="22" y="0" class="legend-text">image patches</text>

    <rect x="160" y="-11" width="14" height="14" fill="#f59e0b" opacity="0.9"/>
    <text x="182" y="0" class="legend-text">video patches (I + selected P)</text>

    <rect x="430" y="-11" width="14" height="14" fill="#8b5cf6" opacity="0.85"/>
    <text x="452" y="0" class="legend-text">multi-image patches</text>

    <text x="1020" y="0" text-anchor="end" class="legend-text" fill="#64748b" font-style="italic">one encoder · one token stream · no per-modality adapters</text>
  </g>
</svg>
